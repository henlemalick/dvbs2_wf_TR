# dvbs2_wf_TR - video remote mode
# File source to remote UDP sink (streaming media file to viewer)

[node]
device_args = "type=b200"

[tx]
device_args = "type=b200,serial=8000693"
freq_hz     = 1.282e9
modcod      = "QPSK_1/2"
frame_size  = "short"
pilots      = true
rolloff     = 0.35
symbol_rate = 2.0e6
oversample  = 2
gain_db     = 70
antenna     = "TX/RX"

[rx]
device_args  = "type=b200,serial=8000693"
freq_hz      = 1.282e9
modcod       = "QPSK_1/2"
frame_size   = "short"
pilots       = true
symbol_rate  = 2.0e6
oversample   = 4
gain_db      = 40
antenna      = "RX2"
lo_offset_hz = 4.0e6

[fec]
ldpc_iters  = 25

[payload]
source     = "file:media/sample.mp4"
sink       = "udp://192.168.0.100:1234"
codec      = "h264"
resolution = "640x480"
framerate  = 30
encoder    = "sw"

[runtime]
log_level = "info"
stats_period_ms = 1000
