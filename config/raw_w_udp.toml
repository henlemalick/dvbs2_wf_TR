# dvbs2_wf_TR - raw data mode with UDP
# External data injection via UDP (TX reads UDP, RX forwards to UDP)
# Usage: dvbs2_wf_TR.sh tx raw_w_udp --raw --raw-udp-in 5005
#        dvbs2_wf_TR.sh rx raw_w_udp --raw --raw-udp-out VIEWER_IP:5006
#        dvbs2_wf_TR.sh bench raw_w_udp --raw --raw-udp-in 5005 --raw-udp-out VIEWER_IP:5006

[node]
device_args = "type=b200"

[tx]
device_args = "type=b200,serial=8000693"
freq_hz     = 1.282e9
modcod      = "QPSK_1/2"
frame_size  = "short"
pilots      = true
rolloff     = 0.35
symbol_rate = 2.0e6
oversample  = 2
gain_db     = 70
antenna     = "TX/RX"

[rx]
device_args  = "type=b200,serial=8000693"
freq_hz      = 1.282e9
modcod       = "QPSK_1/2"
frame_size   = "short"
pilots       = true
symbol_rate  = 2.0e6
oversample   = 4
gain_db      = 40
antenna      = "RX2"
lo_offset_hz = 4.0e6

[fec]
ldpc_iters  = 25

[raw]
payload = "TAG 786 latency test"

[runtime]
log_level = "info"
stats_period_ms = 1000
